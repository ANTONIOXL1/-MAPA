<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Interactivo</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh; /* ocupa toda la pantalla */
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Crear mapa centrado en Lima
  var map = L.map('map').setView([-12.0464, -77.0428], 13);

  // Cargar mapa base
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Marcador simple
  L.marker([-12.0464, -77.0428]).addTo(map)
    .bindPopup("📍 Centro de Lima")
    .openPopup();

  // Ejemplo con varios puntos (puedes editar)
  var puntos = [
    { lat: -12.05, lng: -77.04, nombre: "Punto 1" },
    { lat: -12.06, lng: -77.03, nombre: "Punto 2" }
  ];

  puntos.forEach(function(p) {
    L.marker([p.lat, p.lng]).addTo(map)
      .bindPopup(p.nombre);
  });

</script>

</body>
</html>
