<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Perú</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100%; }

    /* 🔥 elimina fondo gris completamente */
    .leaflet-marker-icon,
    .leaflet-div-icon {
      background: transparent !important;
      border: none !important;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // 🇵🇪 MAPA INICIAL
  var map = L.map('map').setView([-9.19, -75.0152], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 🔥 FUNCIÓN PARA ICONOS LIMPIOS
  function crearIcono(url) {
    return L.divIcon({
      html: `<img src="${url}" style="width:40px;height:40px;">`,
      className: '',
      iconSize: [40, 40],
      iconAnchor: [20, 40]
    });
  }

  // 🎨 ICONOS
  var iconos = {
    ipress: crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png?v=3'),
    saneamiento: crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png?v=3'),
    fabricante: crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png?v=3'),
    importador: crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabricante_verde.png?v=3'),
    default: crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png?v=3')
  };

  // 🧪 PRUEBA (DEBE VERSE EN LIMA)
  L.marker([-12.0464, -77.0428], {
    icon: iconos.ipress
  }).addTo(map).bindPopup("PRUEBA LIMA");

  // 📡 TU GOOGLE SHEETS
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
    .then(res => res.text())
    .then(data => {

      var filas = data.split("\n");

      filas.slice(1).forEach(fila => {

        if (!fila) return;

        var columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        if (columnas.length < 3) return;

        var ubicacion = (columnas[2] || "").replace(/"/g, '').trim();
        var tipo = (columnas[3] || "").toLowerCase().trim();

        if (!ubicacion.includes(",")) return;

        var coords = ubicacion.split(",");
        var lat = parseFloat(coords[0]);
        var lng = parseFloat(coords[1]);

        if (isNaN(lat) || isNaN(lng)) return;

        // 🔥 SELECCIONAR ICONO
        var icono = iconos.default;

        if (tipo.includes("ipress")) {
          icono = iconos.ipress;
        }
        else if (tipo.includes("saneamiento")) {
          icono = iconos.saneamiento;
        }
        else if (tipo.includes("fabricante")) {
          icono = iconos.fabricante;
        }
        else if (tipo.includes("importador")) {
          icono = iconos.importador;
        }

        // 📍 MARCADOR
        L.marker([lat, lng], { icon: icono })
          .addTo(map)
          .bindPopup("Tipo: " + tipo);

      });

    })
    .catch(err => {
      console.error(err);
      alert("Error cargando datos");
    });

});
</script>

</body>
</html>
