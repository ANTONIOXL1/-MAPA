<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Perú OK</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height:90vh; }

#filtros {
  padding:10px;
  background:#f4f4f4;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<div id="filtros">
  <input type="text" id="buscar" placeholder="Buscar distrito...">

  <select id="filtroResultado">
    <option value="">Resultado</option>
    <option value="conforme">Conforme</option>
    <option value="no">No Conforme</option>
  </select>

  <select id="filtroTipo">
    <option value="">Tipo</option>
    <option value="ipress">IPRESS</option>
    <option value="saneamiento">Saneamiento</option>
    <option value="fabricante">Fabricante</option>
    <option value="importador">Importador</option>
  </select>

  <select id="filtroMes">
    <option value="">Mes</option>
    <option value="enero">Enero</option>
    <option value="febrero">Febrero</option>
    <option value="marzo">Marzo</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  var map = L.map('map').setView([-12.04, -77.03], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  var markers = [];
  var dataGlobal = [];

  function limpiar(txt){
    return (txt||"").toString().toLowerCase().trim();
  }

  function crearIcono(url){
    return L.icon({
      iconUrl: url,
      iconSize: [30,30],
      iconAnchor: [15,30]
    });
  }

  function icono(tipo, resultado){

    tipo = limpiar(tipo);
    resultado = limpiar(resultado);

    let rojo = "https://cdn-icons-png.flaticon.com/512/463/463612.png";
    let verde = "https://cdn-icons-png.flaticon.com/512/190/190411.png";

    if(resultado.includes("no")) return crearIcono(rojo);
    if(resultado.includes("conforme")) return crearIcono(verde);

    return crearIcono(verde);
  }

  function dibujar(data){

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data.forEach(d => {

      let marker = L.marker([d.lat, d.lng], {
        icon: icono(d.tipo, d.resultado)
      })
      .addTo(map)
      .bindPopup(`
        <b>${d.direccion}</b><br>
        ${d.distrito}<br>
        ${d.mes}<br>
        ${d.resultado}
      `);

      markers.push(marker);
    });
  }

  function filtrar(){

    let texto = limpiar(document.getElementById("buscar").value);
    let res = limpiar(document.getElementById("filtroResultado").value);
    let tipo = limpiar(document.getElementById("filtroTipo").value);
    let mes = limpiar(document.getElementById("filtroMes").value);

    let filtrados = dataGlobal.filter(d => {

      let dRes = limpiar(d.resultado);
      let dTipo = limpiar(d.tipo);
      let dMes = limpiar(d.mes);
      let dDist = limpiar(d.distrito);

      let okRes = true;
      if(res === "conforme"){
        okRes = dRes.includes("conforme") && !dRes.includes("no");
      } else if(res === "no"){
        okRes = dRes.includes("no");
      }

      let okTipo = !tipo || dTipo.includes(tipo);
      let okMes = !mes || dMes.includes(mes);
      let okTexto = !texto || dDist.includes(texto);

      return okRes && okTipo && okMes && okTexto;
    });

    dibujar(filtrados);
  }

  document.getElementById("buscar").oninput = filtrar;
  document.getElementById("filtroResultado").onchange = filtrar;
  document.getElementById("filtroTipo").onchange = filtrar;
  document.getElementById("filtroMes").onchange = filtrar;

  // 🔥 LECTURA CSV CORREGIDA
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
  .then(res => res.text())
  .then(text => {

    let filas = text.split("\n");

    for(let i=1;i<filas.length;i++){

      let cols = filas[i].split(",");

      if(cols.length < 7) continue;

      let coords = cols[1].replace(/"/g,'').split(",");

      if(coords.length < 2) continue;

      let lat = parseFloat(coords[0]);
      let lng = parseFloat(coords[1]);

      if(isNaN(lat) || isNaN(lng)) continue;

      dataGlobal.push({
        direccion: cols[0],
        lat: lat,
        lng: lng,
        tipo: cols[2],
        resultado: cols[3],
        distrito: cols[4],
        mes: cols[5],
        medida: cols[6]
      });
    }

    console.log("DATOS:", dataGlobal); // 👈 VERIFICACIÓN

    dibujar(dataGlobal);
  });

});
</script>

</body>
</html>
