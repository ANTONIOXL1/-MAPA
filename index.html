<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Perú</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; width: 100%; }

    /* 🏷️ Leyenda */
    .legend {
      background: white;
      padding: 10px;
      line-height: 18px;
      color: #333;
      border-radius: 8px;
    }
    .legend img {
      width: 20px;
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // 🇵🇪 Vista Perú
  var map = L.map('map').setView([-9.19, -75.0152], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 🎨 ICONOS DESDE TU GITHUB
  var iconos = {
    ipress: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png',
      iconSize: [35, 35]
    }),
    saneamiento: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png',
      iconSize: [35, 35]
    }),
    comercial: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/comercial_rojo.png',
      iconSize: [35, 35]
    }),
    comercial2: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/comercial_verde.png',
      iconSize: [35, 35]
    }),
    fabrica: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabrica_rojo.png',
      iconSize: [35, 35]
    }),
    importador: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png',
      iconSize: [35, 35]
    }),
    default: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png',
      iconSize: [35, 35]
    })
  };

  // 📡 Cargar CSV
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
    .then(res => res.text())
    .then(data => {

      var filas = data.split("\n");
      var bounds = [];

      filas.slice(1).forEach(fila => {

        var columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        var ubicacion = (columnas[2] || "").replace(/"/g, '').trim();
        var tipo = (columnas[3] || "").toLowerCase();

        if (ubicacion.includes(",")) {

          var coords = ubicacion.split(",");
          var lat = parseFloat(coords[0]);
          var lng = parseFloat(coords[1]);

          if (!isNaN(lat) && !isNaN(lng)) {

            bounds.push([lat, lng]);

            var icono = iconos.default;

            // 🔥 CONDICIONES
            if (tipo.includes("ipress")) {
              icono = iconos.ipress;
            }
            else if (tipo.includes("saneamiento")) {
              icono = iconos.saneamiento;
            }
            else if (tipo.includes("comercial")) {
              icono = iconos.comercial;
            }
            else if (tipo.includes("fabrica") || tipo.includes("importador")) {
              icono = iconos.fabrica;
            }

            L.marker([lat, lng], { icon: icono })
              .addTo(map)
              .bindPopup("🏢 Tipo: " + tipo);
          }
        }

      });

      if (bounds.length > 0) {
        map.fitBounds(bounds);
      }

    });

  // 🏷️ LEYENDA
  var legend = L.control({position: 'bottomright'});

  legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');

    div.innerHTML += "<b>Tipos</b><br>";
    div.innerHTML += "<img src='https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png'> IPRESS<br>";
    div.innerHTML += "<img src='https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png'> Saneamiento<br>";
    div.innerHTML += "<img src='https://antonioxl1.github.io/MAPA/iconos/comercial_rojo.png'> Comercial<br>";
    div.innerHTML += "<img src='https://antonioxl1.github.io/MAPA/iconos/fabrica_rojo.png'> Fábrica / Importador<br>";

    return div;
  };

  legend.addTo(map);

});
</script>

</body>
</html>
