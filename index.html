<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Perú PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }

#map { height:90vh; }

#filtros {
  padding:10px;
  background:#f4f4f4;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select, input {
  padding:6px;
}

/* 🔥 LEYENDA */
.legend {
  background: white;
  padding: 10px;
  line-height: 1.5;
  border-radius: 8px;
  box-shadow: 0 0 6px rgba(0,0,0,0.3);
}

.legend img {
  width:20px;
  vertical-align:middle;
  margin-right:5px;
}
</style>
</head>

<body>

<div id="filtros">
  <input type="text" id="buscar" placeholder="Buscar distrito...">

  <select id="filtroResultado">
    <option value="">Resultado</option>
    <option>Conforme</option>
    <option>No Conforme</option>
  </select>

  <select id="filtroTipo">
    <option value="">Tipo</option>
    <option>IPRESS</option>
    <option>Emp. Saneamiento</option>
    <option>Fabricante</option>
    <option>Importador</option>
  </select>

  <select id="filtroMes">
    <option value="">Mes</option>
    <option>Enero</option>
    <option>Febrero</option>
    <option>Marzo</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  var map = L.map('map').setView([-12.04, -77.03], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var markers = [];
  var dataGlobal = [];

  function limpiar(txt){
    return (txt||"").toString().toLowerCase().trim();
  }

  function limpiarTexto(txt){
    return (txt||"").toString().replace(/"/g,'').trim();
  }

  function crearIcono(url){
    return L.divIcon({
      html: `<img src="${url}" width="35">`,
      className:'',
      iconSize:[35,35],
      iconAnchor:[17,35]
    });
  }

  // 🔥 ICONOS INTELIGENTES
  function icono(tipo, resultado){

    tipo = limpiar(tipo);
    resultado = limpiar(resultado);

    var esNoConforme =
      resultado.includes("no") ||
      resultado.includes("incumple") ||
      resultado.includes("observado");

    if(tipo.includes("ipress") || tipo.includes("saneamiento")){
      return esNoConforme
        ? crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png')
        : crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png');
    }

    if(tipo.includes("fabricante")){
      return esNoConforme
        ? crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabrica_rojo.png')
        : crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png');
    }

    if(tipo.includes("importador")){
      return esNoConforme
        ? crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabricante_rojo.png')
        : crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabricante_verde.png');
    }

    return esNoConforme
      ? crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png')
      : crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png');
  }

  function dibujar(data){

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data.forEach(d => {

      var m = L.marker([d.lat, d.lng], {
        icon: icono(d.tipo, d.resultado)
      })
      .addTo(map)
      .bindPopup(`
        <b>${d.direccion || "Sin dirección"}</b><br>
        📍 ${d.distrito || "Sin distrito"}<br>
        📅 ${d.mes || "Sin mes"}<br>
        ⚠️ ${d.resultado || "Sin resultado"}<br>
        🛑 ${d.medida || "Sin medida"}
      `);

      markers.push(m);
    });
  }

  function filtrar(){

    var texto = limpiar(document.getElementById("buscar").value);
    var res = limpiar(document.getElementById("filtroResultado").value);
    var tipo = limpiar(document.getElementById("filtroTipo").value);
    var mes = limpiar(document.getElementById("filtroMes").value);

    var filtrados = dataGlobal.filter(d => {

      return (!texto || limpiar(d.distrito).includes(texto)) &&
             (!res || limpiar(d.resultado).includes(res)) &&
             (!tipo || limpiar(d.tipo).includes(tipo)) &&
             (!mes || limpiar(d.mes).includes(mes));
    });

    dibujar(filtrados);
  }

  document.getElementById("buscar").oninput = filtrar;
  document.getElementById("filtroResultado").onchange = filtrar;
  document.getElementById("filtroTipo").onchange = filtrar;
  document.getElementById("filtroMes").onchange = filtrar;

  // 🔥 LEYENDA
  var legend = L.control({position: "bottomright"});

  legend.onAdd = function(){
    var div = L.DomUtil.create("div", "legend");
    div.innerHTML = `
      <b>Leyenda</b><br>
      <img src="https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png"> Conforme<br>
      <img src="https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png"> No Conforme<br>
      <img src="https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png"> Fabricante<br>
      <img src="https://antonioxl1.github.io/MAPA/iconos/fabrica_rojo.png"> Fabricante No Conforme
    `;
    return div;
  };

  legend.addTo(map);

  // 🔥 CARGA CSV
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
  .then(r => r.text())
  .then(data => {

    var filas = data.split("\n");
    var headers = filas[0].split(",").map(h => h.toLowerCase().trim());

    function idx(nombre){
      return headers.indexOf(nombre.toLowerCase());
    }

    var iDireccion = idx("direccion");
    var iUbicacion = idx("latitud");
    var iTipo = idx("tipo");
    var iResultado = idx("resultado");
    var iDistrito = idx("distrito");
    var iMes = idx("mes");
    var iMedida = idx("medida");

    filas.slice(1).forEach(fila => {

      if(!fila.trim()) return;

      var col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

      var ubic = limpiarTexto(col[iUbicacion]);

      if(!ubic.includes(",")) return;

      var c = ubic.split(",");
      var lat = parseFloat(c[0]);
      var lng = parseFloat(c[1]);

      if(isNaN(lat) || isNaN(lng)) return;

      dataGlobal.push({
        lat: lat,
        lng: lng,
        direccion: limpiarTexto(col[iDireccion]),
        tipo: limpiarTexto(col[iTipo]),
        resultado: limpiarTexto(col[iResultado]),
        distrito: limpiarTexto(col[iDistrito]),
        mes: limpiarTexto(col[iMes]),
        medida: limpiarTexto(col[iMedida])
      });

    });

    dibujar(dataGlobal);

  });

});
</script>

</body>
</html>
